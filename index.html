<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H3k</title>
    <link rel="stylesheet" href="src/styles.css">
    <script src="src/assets/vendor/jsmediatags.min.js"></script>
</head>

<script>
    const config = {
        videos: true,
        imgs: true
    }
</script>

<body>
    <div id="content"></div>

    <dialog id="key-modal">
        <form class="sp-unlock" method="dialog" autocomplete="off">
            <div class="sp-unlock-title">encriptado</div>
            <input class="sp-key" type="text" placeholder="key" />
            <div class="sp-unlock-actions">
                <button type="submit" class="sp-unlock-go">abrir</button>
                <button type="button" class="sp-unlock-cancel">cancelar</button>
            </div>
            <span class="sp-unlock-status"></span>
        </form>
    </dialog>

    <footer>ahora que leiste todo esto, se siente un poco raro, no? ojala que no me conozcas en persona jaja</footer>

    <div id="sidebar">
        <div id="mini-player" hidden>
            <div class="audio-player song-player">
                <div class="sp-cover"><span class="sp-cover-ph">♪</span></div>
                <div class="sp-body">
                    <div class="sp-name"></div>
                    <div class="sp-controls">
                        <button class="ap-play" aria-label="reproducir">►</button>
                        <svg class="ap-bar">
                            <path class="ap-track"></path>
                            <path class="ap-fill"></path>
                        </svg>
                        <span class="ap-time">0:00</span>
                    </div>
                </div>
            </div>
        </div>

        <aside id="comments-aside">
            <form id="comment-form" autocomplete="off">
                <input id="c-username" type="text" placeholder="tu nombre" maxlength="32" required />
                <textarea id="c-message" placeholder="dejá algo..." maxlength="250" required></textarea>
                <button type="submit">enviar</button>
            </form>
            <div id="comment-status"></div>
            <div id="comment-list"></div>
        </aside>
    </div>

    <button id="comments-fab" type="button" aria-label="comentarios">comentarios</button>

    <dialog id="comments-modal">
        <button id="comments-modal-close" type="button" aria-label="cerrar">✕</button>
        <div id="comments-modal-slot"></div>
    </dialog>
</body>

<script>
    const contentElement = document.getElementById("content")

    // Los posts viven en src/posts.json; los traemos y renderizamos.
    fetch("src/posts.json")
        .then((res) => res.json())
        .then((posts) => {
            posts.forEach((post) => {
                if (post.hidden) return;
                const postElement = document.createElement('div');
                postElement.className = 'post';
                postElement.innerHTML = `
                    <div class="date">${post.date}</div>
                    ${post.content.map(c => `<p>${c}</p>`).join('')}
                    ${post.video ? `<video src="${post.video}" controls></video>` : ''}
                    ${post.audio ? `
                    <div class="audio-player">
                        <audio src="${post.audio}" preload="metadata" data-title="${post.date}"></audio>
                        <button class="ap-play" aria-label="reproducir">►</button>
                        <svg class="ap-bar"><path class="ap-track"></path><path class="ap-fill"></path></svg>
                        <span class="ap-time">0:00</span>
                        <button class="ap-vol-btn" aria-label="volumen"></button>
                        <div class="ap-vol"><div class="ap-vol-fill"></div></div>
                    </div>` : ''}
                    ${post.song ? `
                    <div class="audio-player song-player">
                        <audio src="${post.song}" preload="metadata" data-title="${post.date}"></audio>
                        <div class="sp-cover"><span class="sp-cover-ph">♪</span></div>
                        <div class="sp-body">
                            <div class="sp-name">cargando…</div>
                            <div class="sp-controls">
                                <button class="ap-play" aria-label="reproducir">►</button>
                                <svg class="ap-bar"><path class="ap-track"></path><path class="ap-fill"></path></svg>
                                <span class="ap-time">0:00</span>
                                <button class="ap-vol-btn" aria-label="volumen"></button>
                                <div class="ap-vol"><div class="ap-vol-fill"></div></div>
                            </div>
                        </div>
                    </div>` : ''}
                    ${post.songEnc ? `
                    <div class="audio-player song-player locked" data-content="${post.content.join(' ')}">
                        <audio data-enc="${post.songEnc}" preload="none" data-title="encriptado"></audio>
                        <div class="sp-cover"><span class="sp-cover-ph sp-cover-ph-profile"><svg viewBox="0 0 56 56" width="56" height="56" aria-label="encriptado"><rect width="56" height="56" fill="#8a7d62"/><g fill="#ffffff"><circle cx="28" cy="22" r="11"/><path d="M28 35c-11 0-20 7-20 16v5h40v-5c0-9-9-16-20-16z"/></g></svg></span></div>
                        <div class="sp-body">
                            <div class="sp-name">${post.songEnc.split('/').pop()}</div>
                            <div class="sp-controls">
                                <button class="ap-play" aria-label="reproducir">►</button>
                                <svg class="ap-bar"><path class="ap-track"></path><path class="ap-fill"></path></svg>
                                <span class="ap-time">0:00</span>
                                <button class="ap-vol-btn" aria-label="volumen"></button>
                                <div class="ap-vol"><div class="ap-vol-fill"></div></div>
                            </div>
                        </div>
                    </div>` : ''}
                    ${post.img ? `<img src="${post.img}" />` : ''}
                    ${post.pdf ? `<a href="${post.pdf}" download>${post.pdf}</a>` : ''}
                `
                contentElement.appendChild(postElement)
            })
            initAudioPlayers();
            loadSongMetadata();
        })
        .catch((err) => console.error("No se pudieron cargar los posts:", err));

    // Lee el ID3 de cada .song-player: pone portada + nombre desde la metadata.
    function loadSongMetadata() {
        console.log("[meta] loadSongMetadata: jsmediatags?", !!window.jsmediatags);
        if (!window.jsmediatags) { console.warn("[meta] jsmediatags no cargó"); return; }
        const players = document.querySelectorAll(".song-player");
        console.log("[meta] song-players encontrados:", players.length);
        players.forEach((player) => {
            const audio = player.querySelector("audio");
            // Saltea las encriptadas todavía bloqueadas (sin src real aún) y
            // el mini-player (no tiene <audio> propio).
            if (!audio || audio.dataset.enc || !audio.getAttribute("src")) return;
            const cover = player.querySelector(".sp-cover");
            const name = player.querySelector(".sp-name");
            const src = audio.src;
            console.log("[meta] fetch ->", src);
            // Bajamos el archivo como Blob y leemos el ID3 de ahí: evita las
            // range-requests del XhrFileReader que cuelgan en muchos servers.
            fetch(src)
                .then((res) => {
                    console.log("[meta] fetch resp", src, res.status, res.ok);
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    return res.blob();
                })
                .then((blob) => {
                    console.log("[meta] blob", src, blob.size, blob.type);
                    jsmediatags.read(blob, {
                        onSuccess: ({ tags }) => {
                            console.log("[meta] tags OK", src, tags.artist, "-", tags.title, "pic?", !!(tags.picture && tags.picture.data));
                            const title = (tags.title || "").trim();
                            const artist = (tags.artist || "").trim();
                            const label = [artist, title].filter(Boolean).join(" – ") || "canción";
                            name.textContent = label;
                            audio.dataset.title = label;
                            const pic = tags.picture;
                            if (pic && pic.data && pic.data.length) {
                                let bin = "";
                                const d = pic.data;
                                for (let i = 0; i < d.length; i++) bin += String.fromCharCode(d[i]);
                                const url = `data:${pic.format};base64,${btoa(bin)}`;
                                cover.style.backgroundImage = `url("${url}")`;
                                cover.classList.add("has-cover");
                            }
                            // Refresca el mini si esta canción ya está sonando.
                            if (typeof window.refreshMini === "function") window.refreshMini(audio);
                        },
                        onError: (err) => {
                            console.error("[meta] jsmediatags onError", src, err);
                            name.textContent = "canción";
                        },
                    });
                })
                .catch((err) => {
                    console.error("[meta] fetch/blob falló", src, err);
                    name.textContent = "canción";
                });
        });
    }
    // Expuesta para que decrypt_music.js re-lea el ID3 al desbloquear.
    window.loadSongMetadata = loadSongMetadata;

    // ---- Inicializa los reproductores de audio personalizados ----
    const fmtTime = (s) => {
        if (!isFinite(s)) return "0:00";
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60).toString().padStart(2, "0");
        return `${m}:${sec}`;
    };

    // Genera un camino tipo víbora (onda senoidal) del ancho dado.
    const buildWave = (width) => {
        const height = 16, mid = height / 2, amp = 4, wavelength = 24, step = 2;
        let d = `M 0 ${mid}`;
        for (let x = step; x <= width; x += step) {
            const y = mid + amp * Math.sin((x / wavelength) * Math.PI * 2);
            d += ` L ${x.toFixed(1)} ${y.toFixed(1)}`;
        }
        return d;
    };

    // Icono de parlante segun el nivel: 0 silenciado, 1 bajo, 2 alto.
    const speakerIcon = (level) => {
        const body = '<path d="M2 6 H4.5 L8 3.2 V12.8 L4.5 10 H2 Z" fill="currentColor"/>';
        let extra = "";
        if (level === 0) {
            extra = '<path d="M10.5 6 L14 9.5 M14 6 L10.5 9.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>';
        } else {
            extra = '<path d="M10.3 6.2 Q12 8 10.3 9.8" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>';
            if (level === 2) extra += '<path d="M12 4.6 Q15 8 12 11.4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>';
        }
        return `<svg viewBox="0 0 16 16" width="16" height="16">${body}${extra}</svg>`;
    };

    function initAudioPlayers() {
        // ---- Mini reproductor persistente (arriba de los comentarios) ----
        const mini = {
            el: document.getElementById("mini-player"),
            play: document.querySelector("#mini-player .ap-play"),
            title: document.querySelector("#mini-player .sp-name"),
            cover: document.querySelector("#mini-player .sp-cover"),
            bar: document.querySelector("#mini-player .ap-bar"),
            track: document.querySelector("#mini-player .ap-track"),
            fill: document.querySelector("#mini-player .ap-fill"),
            time: document.querySelector("#mini-player .ap-time"),
            current: null,
            pathLen: 0,
        };

        // Dibuja la víbora del mini reproductor segun su ancho (igual que en el post).
        const drawMiniWave = () => {
            const w = mini.bar.getBoundingClientRect().width;
            if (!w) return;
            const d = buildWave(w);
            mini.track.setAttribute("d", d);
            mini.fill.setAttribute("d", d);
            mini.pathLen = mini.fill.getTotalLength();
            mini.fill.style.strokeDasharray = mini.pathLen;
            renderMini();
        };

        const renderMini = () => {
            const a = mini.current;
            if (!a) return;
            const ratio = a.duration ? a.currentTime / a.duration : 0;
            mini.fill.style.strokeDashoffset = mini.pathLen * (1 - ratio);
            mini.time.textContent = fmtTime((a.duration || 0) - a.currentTime);
            mini.play.textContent = a.paused ? "►" : "❚❚";
        };

        const showMini = (audio) => {
            mini.current = audio;
            mini.title.textContent = audio.dataset.title || "";
            // Copia la portada del player de origen (si es una canción con ID3).
            const srcCover = audio.closest(".song-player") &&
                audio.closest(".song-player").querySelector(".sp-cover");
            if (srcCover && srcCover.classList.contains("has-cover")) {
                mini.cover.style.backgroundImage = srcCover.style.backgroundImage;
                mini.cover.classList.add("has-cover");
            } else {
                mini.cover.style.backgroundImage = "";
                mini.cover.classList.remove("has-cover");
            }
            mini.el.hidden = false;
            drawMiniWave();
        };

        // Si la metadata (portada/título) llega DESPUÉS de empezar a sonar
        // (caso típico: canción encriptada que se reproduce apenas se desbloquea),
        // re-copia portada y título al mini reproductor en curso.
        window.refreshMini = (audio) => { if (mini.current === audio) showMini(audio); };

        window.addEventListener("resize", () => { if (!mini.el.hidden) drawMiniWave(); });

        const hideMini = (audio) => {
            if (mini.current !== audio) return;
            mini.el.hidden = true;
            mini.current = null;
        };

        mini.play.addEventListener("click", () => {
            if (!mini.current) return;
            if (mini.current.paused) mini.current.play();
            else mini.current.pause();
        });

        mini.bar.addEventListener("click", (e) => {
            const a = mini.current;
            if (!a || !isFinite(a.duration)) return;
            const rect = mini.bar.getBoundingClientRect();
            const ratio = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
            a.currentTime = ratio * a.duration;
        });

        const allAudios = [...document.querySelectorAll("#content .audio-player audio")];

        document.querySelectorAll("#content .audio-player").forEach((player) => {
            const audio = player.querySelector("audio");
            const playBtn = player.querySelector(".ap-play");
            const bar = player.querySelector(".ap-bar");
            const track = player.querySelector(".ap-track");
            const fill = player.querySelector(".ap-fill");
            const time = player.querySelector(".ap-time");

            let pathLen = 0;
            let rafId = null;

            const updateProgress = () => {
                const ratio = audio.duration ? audio.currentTime / audio.duration : 0;
                fill.style.strokeDashoffset = pathLen * (1 - ratio);
            };

            // Mientras reproduce, actualiza el avance cada frame (~60fps) en vez de
            // depender de timeupdate (que dispara ~4 veces por segundo y se ve a saltos).
            const tick = () => {
                updateProgress();
                if (mini.current === audio) renderMini();
                rafId = requestAnimationFrame(tick);
            };
            const startTick = () => { if (rafId == null) rafId = requestAnimationFrame(tick); };
            const stopTick = () => { if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; } updateProgress(); };

            // Dibuja (o redibuja) la víbora según el ancho actual del reproductor.
            const drawWave = () => {
                const w = bar.getBoundingClientRect().width;
                if (!w) return;
                const d = buildWave(w);
                track.setAttribute("d", d);
                fill.setAttribute("d", d);
                pathLen = fill.getTotalLength();
                fill.style.strokeDasharray = pathLen;
                updateProgress();
            };

            drawWave();
            window.addEventListener("resize", drawWave);

            playBtn.addEventListener("click", () => {
                // Encriptada: pedir key en vez de reproducir vacío.
                if (player.classList.contains("locked")) {
                    if (typeof window.openKeyModal === "function") window.openKeyModal(player);
                    return;
                }
                if (audio.paused) audio.play();
                else audio.pause();
            });

            audio.addEventListener("play", () => {
                playBtn.textContent = "❚❚";
                startTick();
                // Pausa cualquier otro audio: suena uno a la vez.
                allAudios.forEach((other) => { if (other !== audio) other.pause(); });
                showMini(audio);
            });
            audio.addEventListener("pause", () => { playBtn.textContent = "►"; stopTick(); renderMini(); });
            audio.addEventListener("ended", () => { playBtn.textContent = "►"; stopTick(); hideMini(audio); });

            audio.addEventListener("loadedmetadata", () => {
                time.textContent = fmtTime(audio.duration);
            });

            audio.addEventListener("timeupdate", () => {
                time.textContent = fmtTime(audio.duration - audio.currentTime);
                if (mini.current === audio) renderMini();
            });

            audio.addEventListener("seeked", () => {
                updateProgress();
                if (mini.current === audio) renderMini();
            });

            bar.addEventListener("click", (e) => {
                if (!isFinite(audio.duration)) return;
                const rect = bar.getBoundingClientRect();
                const ratio = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
                audio.currentTime = ratio * audio.duration;
            });

            // ---- Control de volumen ----
            const volBtn = player.querySelector(".ap-vol-btn");
            const vol = player.querySelector(".ap-vol");
            const volFill = player.querySelector(".ap-vol-fill");
            let lastVol = 1;

            const renderVol = () => {
                const v = audio.muted ? 0 : audio.volume;
                volFill.style.width = (v * 100) + "%";
                volBtn.innerHTML = speakerIcon(v === 0 ? 0 : (v < 0.5 ? 1 : 2));
            };

            const setVolFromEvent = (e) => {
                const rect = vol.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const ratio = Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
                audio.muted = false;
                audio.volume = ratio;
                if (ratio > 0) lastVol = ratio;
            };

            // Arrastrar o clickear la barrita para subir/bajar el volumen.
            vol.addEventListener("mousedown", (e) => {
                setVolFromEvent(e);
                const move = (ev) => setVolFromEvent(ev);
                const up = () => {
                    document.removeEventListener("mousemove", move);
                    document.removeEventListener("mouseup", up);
                };
                document.addEventListener("mousemove", move);
                document.addEventListener("mouseup", up);
            });
            vol.addEventListener("touchstart", (e) => { setVolFromEvent(e); e.preventDefault(); }, { passive: false });
            vol.addEventListener("touchmove", (e) => { setVolFromEvent(e); e.preventDefault(); }, { passive: false });

            // El boton de parlante silencia / restaura.
            volBtn.addEventListener("click", () => {
                if (audio.muted || audio.volume === 0) {
                    audio.muted = false;
                    audio.volume = lastVol || 1;
                } else {
                    lastVol = audio.volume;
                    audio.muted = true;
                }
            });

            audio.addEventListener("volumechange", () => {
                renderVol();
            });
            renderVol();
        });
    }
</script>

<script>
    // ---- Comentarios desde la API ----
    const API_URL = "https://blog-api.joaquinbastias321.workers.dev/comments";

    const listEl = document.getElementById("comment-list");
    const statusEl = document.getElementById("comment-status");
    const formEl = document.getElementById("comment-form");
    const usernameEl = document.getElementById("c-username");
    const messageEl = document.getElementById("c-message");

    // Formatea created_at (viene como "YYYY-MM-DD HH:MM:SS" en UTC desde D1).
    function formatDate(raw) {
        if (!raw) return "";
        const d = new Date(raw.replace(" ", "T") + "Z");
        if (isNaN(d)) return raw;
        return d.toLocaleString("es-AR", {
            day: "2-digit", month: "2-digit", year: "2-digit",
            hour: "2-digit", minute: "2-digit"
        });
    }

    // Render seguro: usamos textContent (NO innerHTML) porque el contenido
    // viene de usuarios desconocidos -> evita XSS almacenado.
    function renderComments(comments) {
        listEl.textContent = "";
        if (!comments.length) {
            const empty = document.createElement("div");
            empty.className = "c-date";
            empty.textContent = "sé el primero en comentar";
            listEl.appendChild(empty);
            return;
        }
        for (const c of comments) {
            const item = document.createElement("div");
            item.className = "comment";

            const head = document.createElement("div");
            const author = document.createElement("span");
            author.className = "c-author";
            author.textContent = c.username;
            const date = document.createElement("span");
            date.className = "c-date";
            date.textContent = formatDate(c.created_at);
            head.appendChild(author);
            head.appendChild(date);

            const msg = document.createElement("p");
            msg.className = "c-message";
            msg.textContent = c.message;

            item.appendChild(head);
            item.appendChild(msg);
            listEl.appendChild(item);
        }
    }

    async function loadComments() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("status " + res.status);
            const data = await res.json();
            renderComments(data.comments || []);
        } catch (err) {
            statusEl.textContent = "no se pudieron cargar los comentarios";
        }
    }

    formEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = usernameEl.value.trim();
        const message = messageEl.value.trim();
        if (!username || !message) return;

        const btn = formEl.querySelector("button");
        btn.disabled = true;
        statusEl.textContent = "enviando...";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, message })
            });

            if (res.status === 429) {
                statusEl.textContent = "tranqui, esperá un toque antes de volver a comentar";
                return;
            }
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                statusEl.textContent = data.error || "algo salió mal";
                return;
            }

            messageEl.value = "";
            statusEl.textContent = "¡gracias!";
            await loadComments();
        } catch (err) {
            statusEl.textContent = "no se pudo enviar";
        } finally {
            btn.disabled = false;
        }
    });

    loadComments();

    // ---- Comentarios en modal (solo mobile) ----
    // Movemos el <aside> real adentro/afuera del dialog: conserva listeners e ids.
    const fab = document.getElementById("comments-fab");
    const modal = document.getElementById("comments-modal");
    const modalSlot = document.getElementById("comments-modal-slot");
    const modalClose = document.getElementById("comments-modal-close");
    const aside = document.getElementById("comments-aside");
    const sidebar = document.getElementById("sidebar");

    fab.addEventListener("click", () => {
        modalSlot.appendChild(aside);
        modal.showModal();
    });
    const closeModal = () => modal.close();
    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
    modal.addEventListener("close", () => { sidebar.appendChild(aside); });
</script>
