<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H3k</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<script>
    const config = {
        videos: true,
        imgs: true
    }

    // Fetch posts from the API instead of embedding them here
    async function loadPosts () {
        try {
            const res = await fetch('/posts')
            if (!res.ok) throw new Error('Network response was not ok')
            const data = await res.json()
            return Array.isArray(data) ? data : []
        } catch (err) {
            console.error('Failed to load posts', err)
            return []
        }
    }
</script>

<body style="background-image: url('/src/assets/imgs/clouds.png');background-size: cover;"
    class="flex flex-col items-center">
    <div id="content" class="w-[95%] md:w-3/5 flex flex-col gap-2"></div>
    <footer>
        <div class="text-center text-white font-serif mb-4">
            ahora que leiste todo esto, se siente un poco raro, no? ojala que no me conozcas en persona jaja
        </div>
    </footer>
</body>

<script>
    const contentElement = document.getElementById("content")
    let posts = []

    const showMedia = (index) => {
        const post = posts[index]
        const container = document.getElementById(`${index}-text`)
        if (!post || !container) return

        let mediaElement
        if (post.img) {
            mediaElement = document.createElement('img')
            mediaElement.src = post.img
            mediaElement.alt = post.content?.[0] || 'imagen'
        }

        if (post.video) {
            mediaElement = document.createElement('video')
            mediaElement.src = post.video
            mediaElement.controls = true
        }

        if (!mediaElement) return
        mediaElement.className = "md:w-2/3"
        container.appendChild(mediaElement)

        const btn = document.getElementById(`${index}-media-button`)
        if (btn) btn.style.display = 'none'
    }

    ;(async () => {
        posts = await loadPosts()
        if (!posts.length) {
            const empty = document.createElement('div')
            empty.className = 'text-white text-center'
            empty.textContent = 'No hay posts para mostrar.'
            contentElement.appendChild(empty)
            return
        }

        posts.forEach((post, id) => {
            const postElement = document.createElement('div')
            postElement.innerHTML = `<div class="">
            <p class="title-bar-text ">${post.date}</p>
            <div class="bg-gray-900/25 py-2 px-4 border-[6px] border-t-white/10 border-r-white/10 border-b-black/10 border-l-black/10">
                <ul id="${id}-text" class="indent-2 text-pretty text-white font-serif">
                    ${post.content.map((content) => `<p class="mb-2">${content}</p>`).join('')}
                    ${(post.video || post.img) && `<button class="text-pretty text-blue-800 hover:text-blue-600" id="${id}-media-button" onClick='showMedia(${id})'>${post.video ? 'Ver video' : 'Ver imagen'}</button>` || ''}
                </ul>
            </div>
         </div>`
            contentElement.appendChild(postElement)
        })
    })()

</script>

</html>
